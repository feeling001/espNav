; Marine Gateway - ESP32-S3 Firmware
; NMEA-0183 to TCP/WiFi Gateway
; Supports:
;   esp32s3_zero          — ESP32-S3 Zero      4 MB Flash + 2 MB OPI PSRAM  (default)
;   esp32s3_n16r8v        — ESP32-S3 N16R8    16 MB Flash + 8 MB OPI PSRAM
;   esp32s3_zero_debug    — debug variant of esp32s3_zero
;   esp32s3_n16r8v_debug  — debug variant of esp32s3_n16r8

[platformio]
default_envs = esp32s3_zero

[env_common]
platform                = espressif32@6
framework               = arduino
board_build.filesystem  = littlefs
board_build.f_cpu       = 240000000L
board_build.f_flash     = 80000000L
;board_build.flash_mode  = dio

monitor_rts = 0
monitor_dtr = 0

monitor_speed           = 115200
monitor_filters         = esp32_exception_decoder
upload_protocol         = esptool
upload_speed            = 921600

; extra_scripts           = pre:scripts/embed_dashboard.py 


build_flags =
    ; Debug level (0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose)
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Optimization
    -O2
    ; Project version
    -DVERSION=\"1.0.0\"
    ; The frontend can be build into the jffs partition or directly in progmem
    ; we choose progmem as it makes the OTA much easier (one firmware.bin)

lib_deps =
    ESP32Async/ESPAsyncWebServer@^3
    ESP32Async/AsyncTCP@^3.4
    bblanchon/ArduinoJson@^7
    h2zero/NimBLE-Arduino@^2.4

[env:esp32s3_zero]
extends                         = env_common
board                           = esp32-s3-devkitm-1

;board_build.flash_mode          = qio
;board_build.arduino.memory_type = qio_opi
;board_build.psram_type          = opi

board_build.flash_mode          = qio
board_build.arduino.memory_type = qio_qspi

board_build.partitions          = partitions_esp32s3zero.csv
board_upload.flash_size         = 4MB
board_build.arduino.flash_size  = 4MB

monitor_rts 		        	= 0
monitor_dtr 		        	= 0


build_flags =
    ${env_common.build_flags}
    -DBOARD_HAS_PSRAM
    -DBOARD_ESP32S3_ZERO
    -mfix-esp32-psram-cache-issue
;    -DCONFIG_SPIRAM_SPEED_40M
;    -DCONFIG_BT_NIMBLE_MEM_ALLOC_MODE_INTERNAL=1
;    -DARDUINO_RUNNING_CORE=1
;    -DARDUINO_EVENT_RUNNING_CORE=1



[env:esp32s3_n16r8v]
extends                         = env_common
board                           = esp32-s3-devkitc-1-n16r8v
;framework                       = arduino
upload_speed                    = 2000000
board_upload.flash_size         = 16MB
board_build.partitions          = partitions_esp32s3n16r8v.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    ${env_common.build_flags}
    -DBOARD_HAS_PSRAM
    -DARDUINO_ESP32S3_DEV
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -mfix-esp32-psram-cache-issue
    -DBOARD_N16R8
    -DBOARD_FLASH_16MB
    -DWEB_UI_PROGMEM

[env:esp32s3_zero_debug]
extends    = env:esp32s3_zero
build_type = debug
build_flags =
    ${env:esp32s3_zero.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_HTTP_SERVER
    -DDEBUG_ESP_WIFI
    -DDEBUG_ESP_TCP

[env:esp32s3_n16r8v_debug]
extends    = env:esp32s3_n16r8v
build_type = debug
build_flags =
    ${env:esp32s3_n16r8v.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_HTTP_SERVER
    -DDEBUG_ESP_WIFI
    -DDEBUG_ESP_TCP
