; Marine Gateway - ESP32-S3 Firmware
; NMEA-0183 to TCP/WiFi Gateway
; Supports:
;   esp32s3_zero          — ESP32-S3 Zero      4 MB Flash + 2 MB OPI PSRAM  (default)
;   esp32s3_n16r8         — ESP32-S3 N16R8    16 MB Flash + 8 MB OPI PSRAM
;   esp32s3_zero_debug    — debug variant of esp32s3_zero
;   esp32s3_n16r8_debug   — debug variant of esp32s3_n16r8

; ─────────────────────────────────────────────────────────────────────────────
; Default build target
; ─────────────────────────────────────────────────────────────────────────────
[platformio]
default_envs = esp32s3_zero

; ─────────────────────────────────────────────────────────────────────────────
; Shared settings
; ─────────────────────────────────────────────────────────────────────────────
[env_common]
platform  = espressif32
framework = arduino

board_build.filesystem = littlefs
board_build.f_cpu      = 240000000L
board_build.f_flash    = 80000000L

monitor_speed   = 115200
monitor_filters =
    esp32_exception_decoder
    colorize

upload_protocol = esptool
upload_speed    = 921600

build_flags =
    ; Debug level (0=None 1=Error 2=Warn 3=Info 4=Debug 5=Verbose)
    -DCORE_DEBUG_LEVEL=3

    ; USB CDC for serial output (ESP32-S3 has native USB)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

    ; Optimization
    -O2

    ; Project version
    -DVERSION=\"1.0.0\"

lib_deps =
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1
    bblanchon/ArduinoJson@^7
    h2zero/NimBLE-Arduino@^2

; ─────────────────────────────────────────────────────────────────────────────
; ESP32-S3 Zero  —  4 MB Flash + 2 MB OPI PSRAM
; Partition file: partitions_esp32s3zero.csv
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32s3_zero]
extends = env_common
board   = esp32-s3-devkitc-1

board_build.partitions  = partitions_esp32s3zero.csv
board_build.flash_size  = 4MB
board_build.flash_mode  = qio
board_build.psram_type  = opi
board_build.memory_type = qio_opi
board_upload.flash_size = 4MB

build_flags =
    ${env_common.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DBOARD_ESP32S3_ZERO

; ─────────────────────────────────────────────────────────────────────────────
; ESP32-S3 N16R8  —  16 MB Flash + 8 MB OPI PSRAM
; Custom board JSON: boards/esp32s3_n16r8.json
; Partition file: partitions_n16r8.csv
;
; esptool confirmed: Manufacturer c2 / Device 2018 / 16MB / quad / 3.3V
;                   Embedded PSRAM 8MB (AP_3v3)
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32s3_n16r8]
extends = env_common
board   = esp32s3_n16r8

board_build.partitions  = partitions_n16r8.csv

build_flags =
    ${env_common.build_flags}
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DBOARD_N16R8
    -DBOARD_FLASH_16MB

; ─────────────────────────────────────────────────────────────────────────────
; Debug variants
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32s3_zero_debug]
extends    = env:esp32s3_zero
build_type = debug
build_flags =
    ${env:esp32s3_zero.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_HTTP_SERVER
    -DDEBUG_ESP_WIFI
    -DDEBUG_ESP_TCP

[env:esp32s3_n16r8_debug]
extends    = env:esp32s3_n16r8
build_type = debug
build_flags =
    ${env:esp32s3_n16r8.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial
    -DDEBUG_ESP_HTTP_SERVER
    -DDEBUG_ESP_WIFI
    -DDEBUG_ESP_TCP

